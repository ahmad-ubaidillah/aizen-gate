    budget: null
  - agent: "[QUICK]"
    task: "Small Fixes, CLI"
    high_end: null
    standard: null
    budget: "claude-3-haiku"

# Model Family Routing
# Families catch different blind spots - use Sonnet for implementation, Opus for reasoning

families:
  reasoning:
    - "anthropic/claude-3-opus"
    - "google/gemini-1.5-pro"
  implementation:
    - "anthropic/claude-3-5-sonnet"
    - "openai/gpt-4o"
  verification:
    - "anthropic/claude-3-7-sonnet"
    - "google/gemini-2.0-flash"
  budget:
    - "anthropic/claude-3-haiku"
    - "openai/gpt-4o-mini"

fallback_chain:
  - implementation
  - reasoning
  - budget

# Task Profiles
task_profiles:
  research:
    recommendation: "Use Standard for accuracy + speed"
  planning:
    recommendation: "Use High-End for maximum reasoning"
  coding:
    recommendation: "Use Standard for high coding benchmarks"
  verification:
    recommendation: "Use Standard or High-End for logic verification"
  reporting:
    recommendation: "Use Budget for low-cost token consumption"

---

**[Aizen] Profiles configured.** This map ensures we spend tokens where they matter most.
